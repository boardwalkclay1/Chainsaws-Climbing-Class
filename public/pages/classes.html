<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Class Schedule & Openings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/climb-logo.jpg" />

  <!-- Social Preview -->
  <meta property="og:title" content="Tree Climbing Class Schedule" />
  <meta property="og:description" content="See upcoming tree climbing classes, openings, and sign up instantly." />
  <meta property="og:image" content="https://chainsaws-climbing-class.pages.dev/public/img/climb-classes.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chainsaws-climbing-class.pages.dev/pages/classes.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tree Climbing Class Schedule" />
  <meta name="twitter:description" content="See upcoming tree climbing classes, openings, and sign up instantly." />
  <meta name="twitter:image" content="https://chainsaws-climbing-class.pages.dev/public/img/climb-classes.jpg" />

  <link rel="stylesheet" href="/styles.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('/public/img/climb-classes.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    .section {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* CALENDAR WRAPPER */
    .calendar-wrapper {
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #ff7b00;
      margin-bottom: 30px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .calendar-day {
      padding: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      text-align: center;
      cursor: pointer;
      border: 2px solid #ff7b00;
      transition: 0.2s;
    }

    .calendar-day:hover {
      background: rgba(0,0,0,0.85);
    }

    .calendar-day.has-class {
      border: 2px solid #00c853;
    }

    .calendar-day.selected {
      background: #00c853;
      color: #000;
      font-weight: 700;
    }

    .class-card {
      background: rgba(0,0,0,0.6);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      border: 1px solid #333;
    }

    .signup-form {
      margin-top: 25px;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .signup-form input,
    .signup-form select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    .btn-primary {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      background: #00c853;
      color: #000;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .site-header {
      text-align: center;
      padding: 30px 20px;
      color: #fff;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>

<header class="site-header">
  <h1>Upcoming Classes</h1>
  <p>See openings and sign up instantly.</p>
  <a href="/" class="btn secondary">Back to Home</a>
</header>

<main class="section">

  <!-- CALENDAR -->
  <section class="calendar-wrapper">
    <h2>Select a Date</h2>
    <div id="calendarHeader"></div>
    <div id="calendarGrid" class="calendar-grid"></div>
  </section>

  <!-- CLASS LIST -->
  <section>
    <h2>Available Classes</h2>
    <div id="classesList"></div>
  </section>

  <!-- SIGNUP FORM -->
  <section class="signup-form">
    <h2>Sign Up for a Class</h2>
    <p id="selectedClassLabel">No class selected yet.</p>

    <input type="text" id="signupName" placeholder="Your Name" />
    <input type="email" id="signupEmail" placeholder="Your Email" />

    <select id="signupType">
      <option value="group">Group Class ($80)</option>
      <option value="personal">Personal 1-on-1 ($200/hr)</option>
      <option value="private">Private 1-on-1 Class ($200/hr)</option>
    </select>

    <button class="btn-primary" id="signupSubmit">Reserve Spot</button>
    <p id="signupStatus"></p>
  </section>

  <!-- WHAT YOU LEARN -->
  <section>
    <h2>What You’ll Learn</h2>
    <ul>
      <li>Safety basics</li>
      <li>Essential knots</li>
      <li>Gear setup</li>
      <li>Real climbing techniques</li>
    </ul>
  </section>

</main>

<script src="/js/classes.js"></script>
</body>
</html>
