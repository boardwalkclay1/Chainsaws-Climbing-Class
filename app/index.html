<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tree Climbing Training App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/app/manifest.json" />
  <link rel="stylesheet" href="/app/app.css" />
</head>
<body>
  <header class="app-header">
    <h1>My Climbing Dashboard</h1>
    <button id="installPwaBtn" class="btn secondary">Install App</button>
  </header>

  <main id="appRoot">
    <!-- JS will render views here: login, dashboard, lessons, progress, rewards -->
  </main>

  <template id="loginView">
    <section class="view">
      <h2>Sign In</h2>
      <p>Use the email you signed up with on the website.</p>
      <form id="appLoginForm">
        <label>
          Email
          <input type="email" name="email" required />
        </label>
        <button type="submit" class="btn primary">Continue</button>
      </form>
    </section>
  </template>

  <template id="dashboardView">
    <section class="view">
      <h2>Welcome, <span data-bind="name"></span></h2>
      <p>City: <span data-bind="city"></span></p>
      <p>Videos completed: <span data-bind="videosCompleted"></span></p>
      <p>Live class discount: <span data-bind="discount"></span></p>

      <nav class="tabs">
        <button data-tab="lessons">Lessons</button>
        <button data-tab="progress">Progress</button>
        <button data-tab="rewards">Rewards</button>
      </nav>

      <div id="tabContent"></div>
    </section>
  </template>

  <script src="/app/app.js"></script>
</body>
</html>
